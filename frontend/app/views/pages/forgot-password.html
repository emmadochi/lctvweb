<!-- Church TV Forgot Password Page -->
<div class="login-page">
    <div class="container">
        <div class="login-container">
            <!-- Header -->
            <div class="login-header">
                <div class="logo">
                    <i class="fa fa-tv"></i>
                    <span>LCM TV</span>
                </div>
                <h1>Reset Password</h1>
                <p>Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <!-- Form -->
            <form name="vm.forgotForm" ng-submit="vm.submit()" novalidate class="login-form">

                <!-- Error Message -->
                <div class="alert alert-danger" ng-if="vm.errorMessage">
                    <i class="fa fa-exclamation-triangle"></i>
                    {{vm.errorMessage}}
                </div>

                <!-- Success Message -->
                <div class="alert alert-success" ng-if="vm.successMessage">
                    <i class="fa fa-check-circle"></i>
                    {{vm.successMessage}}
                </div>

                <!-- Email Field -->
                <div class="form-group" ng-if="!vm.successMessage">
                    <label for="email">Email Address</label>
                    <input type="email"
                           id="email"
                           name="email"
                           ng-model="vm.email"
                           required
                           class="form-control"
                           placeholder="Enter your account email"
                           ng-keypress="vm.onKeyPress($event)">
                </div>

                <!-- Submit Button -->
                <button type="submit"
                        class="btn btn-primary btn-block"
                        ng-if="!vm.successMessage"
                        ng-disabled="vm.isLoading || vm.forgotForm.$invalid">
                    <i class="fa fa-spinner fa-spin" ng-if="vm.isLoading"></i>
                    {{vm.isLoading ? 'Sending link...' : 'Send Reset Link'}}
                </button>

                <!-- Back to Login -->
                <div class="text-center mt-4">
                    <a href="#/login" class="toggle-link">
                        <i class="fa fa-arrow-left mr-1"></i> Back to Login
                    </a>
                </div>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>&copy; {{vm.currentYear}} LCM TV. All rights reserved.</p>
            </div>
        </div>
    </div>
</div>
