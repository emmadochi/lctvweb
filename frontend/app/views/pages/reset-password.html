<!-- Reset Password Page -->
<div class="login-page" ng-controller="ResetPasswordController as vm">
    <div class="container">
        <div class="login-container">
            <!-- Header -->
            <div class="login-header">
                <div class="logo">
                    <i class="fa fa-lock"></i>
                    <span>Reset Password</span>
                </div>
                <h1>Choose a new password</h1>
                <p>Enter a strong password to secure your LCMTV account.</p>
            </div>

            <!-- Messages -->
            <div class="alert alert-danger" ng-if="vm.errorMessage">
                <i class="fa fa-exclamation-triangle"></i>
                {{vm.errorMessage}}
            </div>

            <div class="alert alert-success" ng-if="vm.successMessage">
                <i class="fa fa-check-circle"></i>
                {{vm.successMessage}}
            </div>

            <!-- Form -->
            <form name="vm.resetForm" ng-submit="vm.submit()" novalidate class="login-form">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password"
                           id="newPassword"
                           name="newPassword"
                           ng-model="vm.password"
                           required
                           minlength="8"
                           class="form-control"
                           placeholder="Enter a new password"
                           ng-keypress="vm.onKeyPress($event)">
                </div>

                <div class="form-group">
                    <label for="newPasswordConfirm">Confirm New Password</label>
                    <input type="password"
                           id="newPasswordConfirm"
                           name="newPasswordConfirm"
                           ng-model="vm.passwordConfirm"
                           required
                           class="form-control"
                           placeholder="Confirm your new password"
                           ng-keypress="vm.onKeyPress($event)">
                </div>

                <button type="submit"
                        class="btn btn-primary btn-block"
                        ng-disabled="vm.isLoading || vm.resetForm.$invalid">
                    <i class="fa fa-spinner fa-spin" ng-if="vm.isLoading"></i>
                    {{vm.isLoading ? 'Please wait...' : 'Reset Password'}}
                </button>

                <div class="text-center mt-3">
                    <a href="#/login" class="toggle-link btn-link">
                        Back to login
                    </a>
                </div>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>&copy; {{vm.currentYear}} LCM TV. All rights reserved.</p>
            </div>
        </div>
    </div>
</div>
